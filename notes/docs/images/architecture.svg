<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif" font-size="13">

  <!-- Coyote Claw outer box -->
  <rect x="20" y="20" width="360" height="240" rx="6" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.03"/>
  <text x="200" y="46" text-anchor="middle" font-size="15" font-weight="600" fill="currentColor">Coyote Claw (Tauri v2)</text>

  <!-- React UI sub-box -->
  <rect x="40" y="62" width="150" height="70" rx="4" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.05"/>
  <text x="115" y="102" text-anchor="middle" font-size="13" font-weight="500" fill="currentColor">React UI</text>

  <!-- Rust WS Server sub-box -->
  <rect x="210" y="62" width="150" height="70" rx="4" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.05"/>
  <text x="285" y="96" text-anchor="middle" font-size="13" font-weight="500" fill="currentColor">Rust WS Server</text>
  <text x="285" y="114" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">0.0.0.0:9999</text>

  <!-- Internal arrow: React UI -> WS Server -->
  <line x1="190" y1="97" x2="206" y2="97" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <polygon points="208,97 202,93 202,101" fill="currentColor" opacity="0.4"/>

  <!-- Tauri Backend label -->
  <text x="200" y="160" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.5">(Tauri Backend)</text>

  <!-- DG-LAB APP box -->
  <rect x="470" y="50" width="140" height="60" rx="4" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.03"/>
  <text x="540" y="76" text-anchor="middle" font-size="13" font-weight="500" fill="currentColor">DG-LAB APP</text>
  <text x="540" y="92" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">(手机端)</text>

  <!-- WebSocket bidirectional arrow: WS Server <-> DG-LAB APP -->
  <line x1="364" y1="80" x2="466" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Right arrowhead -->
  <polygon points="468,80 460,76 460,84" fill="#3b82f6"/>
  <!-- Left arrowhead -->
  <polygon points="362,80 370,76 370,84" fill="#3b82f6"/>
  <text x="415" y="72" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="500">WebSocket</text>
  <text x="415" y="96" text-anchor="middle" font-size="9" fill="#3b82f6" opacity="0.7">JSON messages</text>

  <!-- Coyote 3.0 box -->
  <rect x="660" y="50" width="120" height="60" rx="4" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.03"/>
  <text x="720" y="76" text-anchor="middle" font-size="13" font-weight="500" fill="currentColor">Coyote 3.0</text>
  <text x="720" y="92" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">(设备)</text>

  <!-- BLE arrow: DG-LAB APP -> Coyote 3.0 -->
  <line x1="614" y1="80" x2="656" y2="80" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="658,80 650,76 650,84" fill="#22c55e"/>
  <text x="636" y="72" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="500">BLE</text>

  <!-- Local WebSocket API label + vertical line -->
  <line x1="285" y1="136" x2="285" y2="190" stroke="currentColor" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="285" y="185" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">Local WebSocket API</text>

  <!-- Future UE / External box (dashed) -->
  <rect x="210" y="200" width="150" height="46" rx="4" stroke="currentColor" stroke-width="1" stroke-dasharray="5,4" fill="currentColor" fill-opacity="0.02"/>
  <text x="285" y="221" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.5">UE / External</text>
  <text x="285" y="236" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="500">(Future)</text>

  <!-- Downward arrow from API to UE box -->
  <polygon points="285,198 281,192 289,192" fill="currentColor" opacity="0.3"/>

  <!-- Phase labels -->
  <text x="20" y="290" font-size="11" fill="currentColor" opacity="0.4">Phase 1: Local mode (WS Server embedded in Tauri)</text>
  <text x="20" y="308" font-size="11" fill="currentColor" opacity="0.4">Phase 2: Remote mode (standalone WS Server on VPS)</text>

</svg>