  <text x="175" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#3b82f6">Freq</text>
  <text x="175" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 10</text>
  <rect x="210" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
