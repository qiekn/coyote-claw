  <text x="245" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#3b82f6">Freq</text>
  <text x="245" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 10</text>
  <rect x="280" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
  <text x="315" y="122" text-anchor="middle" font-size="16" font-weight="600" font-family="monospace, monospace" fill="currentColor">0x0A</text>
  <text x="315" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#3b82f6">Freq</text>
  <text x="315" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 10</text>
  <rect x="350" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
  <text x="385" y="122" text-anchor="middle" font-size="16" font-weight="600" font-family="monospace, monospace" fill="currentColor">0x64</text>
  <text x="385" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#f59e0b">Int</text>
  <text x="385" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 100</text>
  <rect x="420" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
  <text x="455" y="122" text-anchor="middle" font-size="16" font-weight="600" font-family="monospace, monospace" fill="currentColor">0x64</text>
  <text x="455" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#f59e0b">Int</text>
  <text x="455" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 100</text>
  <rect x="490" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
  <text x="525" y="122" text-anchor="middle" font-size="16" font-weight="600" font-family="monospace, monospace" fill="currentColor">0x64</text>
  <text x="525" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#f59e0b">Int</text>
  <text x="525" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 100</text>
  <rect x="560" y="100" width="70" height="50" stroke="currentColor" stroke-width="1" fill="currentColor" fill-opacity="0.03"/>
  <text x="595" y="122" text-anchor="middle" font-size="16" font-weight="600" font-family="monospace, monospace" fill="currentColor">0x64</text>
  <text x="595" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#f59e0b">Int</text>
  <text x="595" y="175" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">= 100</text>

  <!-- Frequency group bracket -->
  <line x1="70" y1="189" x2="350" y2="189" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="70" y1="185" x2="70" y2="189" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="350" y1="185" x2="350" y2="189" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="210" y="203" text-anchor="middle" font-size="11" font-weight="500" fill="#3b82f6">Frequency (4 bytes)</text>

  <!-- Intensity group bracket -->
  <line x1="350" y1="189" x2="630" y2="189" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="350" y1="185" x2="350" y2="189" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="630" y1="185" x2="630" y2="189" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="490" y="203" text-anchor="middle" font-size="11" font-weight="500" fill="#f59e0b">Intensity (4 bytes)</text>

  <!-- Timeline baseline -->
  <line x1="70" y1="230" x2="350" y2="230" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="225" x2="70" y2="235" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <text x="105" y="250" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.5">25ms</text>
  <line x1="140" y1="225" x2="140" y2="235" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <text x="175" y="250" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.5">25ms</text>
  <line x1="210" y1="225" x2="210" y2="235" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <text x="245" y="250" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.5">25ms</text>
  <line x1="280" y1="225" x2="280" y2="235" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <text x="315" y="250" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.5">25ms</text>
  <line x1="350" y1="225" x2="350" y2="235" stroke="currentColor" stroke-width="1" opacity="0.4"/>

  <!-- Total duration label -->
  <text x="210" y="268" text-anchor="middle" font-size="12" font-weight="500" fill="currentColor">Total: 4 x 25ms = 100ms</text>

  <!-- Frequency formula note -->
  <text x="490" y="240" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">freq value 10 = 1000 / (10+1) &#x2248; 91 Hz</text>
  <text x="490" y="256" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">period = 1000/(val+1) ms per pulse</text>

</svg>