<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 210" font-family="system-ui, -apple-system, sans-serif">
  <style>
    :root { --fg: #1a1a1a; --fg-dim: #666; --fg-faint: #999; --cell-bg: rgba(0,0,0,0.04); --line: #ccc; --accent-border: #d4a030; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #e4e4e7; --fg-dim: #a1a1aa; --fg-faint: #71717a; --cell-bg: rgba(255,255,255,0.06); --line: #52525b; --accent-border: #f59e0b; }
    }
    text { fill: var(--fg); }
    .dim { fill: var(--fg-dim); }
    .faint { fill: var(--fg-faint); }
    .cell { stroke: var(--line); stroke-width: 1; fill: var(--cell-bg); }
    .cell-bg { fill: var(--cell-bg); }
    .border-accent { fill: none; stroke: var(--accent-border); stroke-width: 1.5; }
  </style>

  <!-- ===== Row 1: Overall structure ===== -->

  <!-- Dungeonlab+pulse: label -->
  <text x="10" y="38" font-size="13" font-weight="600" font-family="monospace, monospace">Dungeonlab+pulse:</text>

  <!-- 波形描述 group (3 sub-fields) -->
  <rect x="170" y="10" width="218" height="48" class="border-accent" rx="3"/>
  <text x="279" y="25" text-anchor="middle" font-size="10" class="faint">波形描述</text>
  <line x1="170" y1="28" x2="388" y2="28" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <rect x="170" y="28" width="73" height="30" class="cell-bg"/>
  <line x1="243" y1="28" x2="243" y2="58" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <rect x="243" y="28" width="73" height="30" class="cell-bg"/>
  <line x1="316" y1="28" x2="316" y2="58" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <rect x="316" y="28" width="72" height="30" class="cell-bg"/>
  <text x="206" y="48" text-anchor="middle" font-size="11">休息时长</text>
  <text x="279" y="48" text-anchor="middle" font-size="11">速度倍率</text>
  <text x="352" y="48" text-anchor="middle" font-size="11">尚不明确</text>

  <!-- = separator -->
  <text x="400" y="42" font-size="16" font-weight="700">=</text>

  <!-- 小节描述 box -->
  <rect x="420" y="16" width="120" height="36" class="border-accent" rx="3"/>
  <rect x="420" y="16" width="120" height="36" class="cell-bg" rx="3"/>
  <text x="480" y="40" text-anchor="middle" font-size="13" font-weight="500">小节描述</text>

  <!-- +section+ -->
  <text x="554" y="40" font-family="monospace, monospace" font-size="11" class="dim">+section+</text>

  <!-- ... -->
  <text x="637" y="40" font-size="14" class="faint">...</text>

  <!-- +section+ -->
  <text x="660" y="40" font-family="monospace, monospace" font-size="11" class="dim">+section+</text>

  <!-- 小节描述 box -->
  <rect x="745" y="16" width="120" height="36" class="border-accent" rx="3"/>
  <rect x="745" y="16" width="120" height="36" class="cell-bg" rx="3"/>
  <text x="805" y="40" text-anchor="middle" font-size="13" font-weight="500">小节描述</text>

  <!-- Row 1 annotation -->
  <text x="580" y="8" text-anchor="middle" font-size="10" class="faint">至多 10 个小节，由 +section+ 分隔</text>

  <!-- ===== Row 2: Section detail ===== -->

  <!-- 小节描述 outer frame -->
  <rect x="60" y="90" width="800" height="52" class="border-accent" rx="3"/>
  <text x="460" y="104" text-anchor="middle" font-size="10" class="faint">小节描述</text>
  <line x1="60" y1="108" x2="860" y2="108" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>

  <!-- Cell: 频率A -->
  <rect x="60" y="108" width="72" height="34" class="cell-bg"/>
  <line x1="132" y1="108" x2="132" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="96" y="130" text-anchor="middle" font-size="11">频率A</text>

  <!-- Cell: 频率B -->
  <rect x="132" y="108" width="72" height="34" class="cell-bg"/>
  <line x1="204" y1="108" x2="204" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="168" y="130" text-anchor="middle" font-size="11">频率B</text>

  <!-- Cell: 小节时长 -->
  <rect x="204" y="108" width="82" height="34" class="cell-bg"/>
  <line x1="286" y1="108" x2="286" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="245" y="130" text-anchor="middle" font-size="11">小节时长</text>

  <!-- Cell: 频率模式 -->
  <rect x="286" y="108" width="82" height="34" class="cell-bg"/>
  <line x1="368" y1="108" x2="368" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="327" y="130" text-anchor="middle" font-size="11">频率模式</text>

  <!-- Cell: 小节开关 -->
  <rect x="368" y="108" width="82" height="34" class="cell-bg"/>
  <line x1="450" y1="108" x2="450" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="409" y="130" text-anchor="middle" font-size="11">小节开关</text>

  <!-- Cell: / separator -->
  <rect x="450" y="108" width="28" height="34" class="cell-bg"/>
  <line x1="478" y1="108" x2="478" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="464" y="131" text-anchor="middle" font-size="14" font-weight="600">/</text>

  <!-- Cell: 强度-脉冲类型 -->
  <rect x="478" y="108" width="120" height="34" class="cell-bg"/>
  <line x1="598" y1="108" x2="598" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="538" y="130" text-anchor="middle" font-size="11">强度-脉冲类型</text>

  <!-- Cell: , ... -->
  <rect x="598" y="108" width="34" height="34" class="cell-bg"/>
  <line x1="632" y1="108" x2="632" y2="142" stroke="var(--line)" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="615" y="130" text-anchor="middle" font-size="13" class="faint">...</text>

  <!-- Cell: 强度-脉冲类型 -->
  <rect x="632" y="108" width="120" height="34" class="cell-bg"/>
  <text x="692" y="130" text-anchor="middle" font-size="11">强度-脉冲类型</text>

  <!-- Bracket: 由逗号分隔 (left half) -->
  <line x1="60" y1="155" x2="450" y2="155" stroke="var(--line)" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="152" x2="60" y2="155" stroke="var(--line)" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="152" x2="450" y2="155" stroke="var(--line)" stroke-width="1" opacity="0.3"/>
  <text x="255" y="168" text-anchor="middle" font-size="10" class="dim">由逗号分隔</text>

  <!-- Bracket: 脉冲元形状 (right half) -->
  <line x1="478" y1="155" x2="752" y2="155" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="478" y1="152" x2="478" y2="155" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="752" y1="152" x2="752" y2="155" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="615" y="168" text-anchor="middle" font-size="10" fill="#f59e0b" opacity="0.8">脉冲元形状 (逗号分隔)</text>

  <!-- Legend -->
  <text x="60" y="195" font-size="10" class="dim">脉冲元每根竖条 = 0.1s，最少 2 根 (0.2s)。锚点间的普通脉冲由线性插值自动计算。</text>
</svg>
