name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Coyote Claw ${{ github.ref_name }}"
          releaseBody: |
            ## Coyote Claw ${{ github.ref_name }}

            DG-LAB Coyote 3.0 第三方控制器。

            ### 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows (x64)** | `_x64-setup.exe` | 推荐，安装向导 |
            | **Windows (x64)** | `_x64_en-US.msi` | 静默安装用 |
            | **macOS (Apple Silicon)** | `_aarch64.dmg` | M1/M2/M3/M4 |
            | **macOS (Intel)** | `_x64.dmg` | Intel Mac |
            | **Linux (x64)** | `_amd64.deb` | Debian/Ubuntu |
            | **Linux (x64)** | `_amd64.AppImage` | 通用 |
            | **Linux (x64)** | `.x86_64.rpm` | Fedora/RHEL |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
